<!DOCTYPE html>
<html>
<head>
    <title>PDF to Editable PPT</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; width: 400px; }
        #dropzone { border: 2px dashed #007bff; padding: 40px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
        #dropzone:hover { background: #e7f0ff; }
        #progressContainer { width: 100%; height: 12px; background: #eee; border-radius: 6px; display: none; overflow: hidden; margin: 20px 0; }
        #progressBar { width: 0%; height: 100%; background: #007bff; transition: width 0.4s; }
        button { background: #28a745; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; display: none; width: 100%; }
        .status { color: #555; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>PDF → PPT Pro</h2>
        <div id="dropzone" onclick="document.getElementById('fileInput').click()">
            Drag PDF here or Click to Upload
            <input type="file" id="fileInput" hidden accept=".pdf">
        </div>
        <div id="progressContainer"><div id="progressBar"></div></div>
        <div id="status" class="status"></div>
        <button id="downloadBtn">Download PowerPoint</button>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const status = document.getElementById('status');
        const downloadBtn = document.getElementById('downloadBtn');

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Reset UI
            progressContainer.style.display = 'block';
            downloadBtn.style.display = 'none';
            status.innerText = "Connecting to server...";
            
            // Fake progress animation
            let progress = 0;
            const interval = setInterval(() => {
                if (progress < 90) {
                    progress += 2;
                    progressBar.style.width = progress + "%";
                    status.innerText = "Converting layout and text...";
                }
            }, 200);

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/convert', { method: 'POST', body: formData });
                if (!response.ok) throw new Error("Conversion failed");

                const blob = await response.blob();
                clearInterval(interval);
                
                // Finish Progress
                progressBar.style.width = "100%";
                status.innerText = "Conversion Complete!";
                
                // Setup Download
                downloadBtn.style.display = 'block';
                downloadBtn.onclick = () => {
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = file.name.replace(".pdf", ".pptx");
                    a.click();
                };
            } catch (err) {
                clearInterval(interval);
                status.innerText = "Error during conversion.";
            }
        };
    </script>
</body>
</html>
